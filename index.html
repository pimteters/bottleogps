<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTTLEO Compass</title>
    <style>
        :root {
            --primary: #ffc107;
            --accent: #ff5252;
            --bg: #0f0c29;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #302b63 0%, #0f0c29 100%);
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .app-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 32px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.5px;
        }

        #status {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 1.5rem;
            min-height: 2.4rem;
        }

        #compass-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 1rem 0;
            display: none; /* Hidden until we have data */
            justify-content: center;
            align-items: center;
        }

        .compass-dial {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .target-indicator {
            position: absolute;
            top: -10px;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 18px solid var(--accent);
            filter: drop-shadow(0 0 10px var(--accent));
            z-index: 10;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.7; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-3px); }
            100% { opacity: 0.7; transform: translateY(0); }
        }

        #arrow {
            width: 40px;
            height: 180px;
            position: relative;
            z-index: 2;
            transition: transform 0.1s ease-out;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
        }

        .needle {
            width: 100%;
            height: 100%;
            background: conic-gradient(
                from 0deg,
                #b71c1c 0deg 90deg,   /* Dark Red (Right facet) */
                #757575 90deg 180deg,  /* Dark Grey (Right facet) */
                #e0e0e0 180deg 270deg, /* Light Grey (Left facet) */
                #ff5252 270deg 360deg  /* Light Red (Left facet) */
            );
            /* Shapes the rectangle into a diamond */
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }
        /* The center pin/hub */
        #arrow::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: #222;
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.4);
            z-index: 2;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        button {
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: bold;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active { transform: scale(0.95); }

        #distance {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="app-card">
        <h1>BOTTLEO FINDER 🍻</h1>
        <p id="status">Press start to find the nearest BOTTLEO.</p>
        
        <button id="startBtn">Find BOTTLEO</button>

        <div id="compass-container">
            <div class="target-indicator"></div>
            <div class="compass-dial"></div>
            <div id="arrow">
                <div class="needle"></div>
            </div>
        </div>

        <p id="distance"></p>
    </div>

    <script>
        const statusText = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const compassContainer = document.getElementById('compass-container');
        const arrow = document.getElementById('arrow');
        const distanceText = document.getElementById('distance');
        
        let targetBearing = 0;
        let currentStore = null;
        let smoothedUserHeading = null;
        const SMOOTHING_FACTOR = 0.15; // Adjust (0.01 to 1.0) for more/less smoothing

        startBtn.addEventListener('click', async () => {
            // 1. Request Compass Permissions (Required for iOS 13+)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission !== 'granted') {
                        statusText.innerText = "Compass permission denied.";
                        return;
                    }
                } catch (error) {
                    console.error(error);
                }
            }

            startBtn.style.display = 'none';
            statusText.innerText = "Locating you...";

            // 2. Watch User Location (updates live as you walk)
            navigator.geolocation.watchPosition(
                (position) => {
                    const userLat = position.coords.latitude;
                    const userLon = position.coords.longitude;

                    if (!currentStore) {
                        statusText.innerText = "Searching for liquor stores...";
                        findNearestStore(userLat, userLon);
                    } else {
                        updateLiveTarget(userLat, userLon);
                    }
                },
                (error) => {
                    statusText.innerText = "Location error: " + error.message;
                },
                { enableHighAccuracy: true, maximumAge: 0 }
            );
        });

        // 3. Find Nearest Store using Overpass API
        async function findNearestStore(lat, lon) {
            // Query OpenStreetMap for alcohol shops within a 5km radius
            // Using nwr (node, way, relation) to find all mapped shops
            const query = `
                [out:json];
                nwr(around:5000,${lat},${lon})["shop"="alcohol"];
                out center;
            `;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.elements && data.elements.length > 0) {
                    // Calculate actual closest store from the results
                    let closestStore = null;
                    let minDistance = Infinity;

                    data.elements.forEach(el => {
                        const sLat = el.lat || (el.center && el.center.lat);
                        const sLon = el.lon || (el.center && el.center.lon);
                        if (sLat && sLon) {
                            const d = calculateDistance(lat, lon, sLat, sLon);
                            if (d < minDistance) {
                                minDistance = d;
                                closestStore = { ...el, lat: sLat, lon: sLon };
                            }
                        }
                    });

                    if (!closestStore) throw new Error("No coordinates");

                    currentStore = closestStore;
                    statusText.innerText = `Target: ${currentStore.tags.name || 'BOTTLEO'}`;
                    distanceText.innerText = `${(minDistance / 1000).toFixed(2)} km away`;
                    compassContainer.style.display = 'flex';
                    
                    targetBearing = calculateBearing(lat, lon, currentStore.lat, currentStore.lon);
                    startCompass();
                } else {
                    statusText.innerText = "No BOTTLEO found within 5km.";
                }
            } catch (error) {
                statusText.innerText = "Error fetching store data.";
            }
        }

        function updateLiveTarget(lat, lon) {
            const dist = calculateDistance(lat, lon, currentStore.lat, currentStore.lon);
            distanceText.innerText = `${(dist / 1000).toFixed(2)} km away`;
            targetBearing = calculateBearing(lat, lon, currentStore.lat, currentStore.lon);
        }

        // Haversine formula to find distance in meters
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) +
                      Math.cos(p1) * Math.cos(p2) *
                      Math.sin(dl/2) * Math.sin(dl/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // 4. Calculate Bearing (The Math)
        function calculateBearing(startLat, startLng, destLat, destLng) {
            const toRadians = (deg) => deg * (Math.PI / 180);
            const toDegrees = (rad) => rad * (180 / Math.PI);

            const phi1 = toRadians(startLat);
            const phi2 = toRadians(destLat);
            const deltaLambda = toRadians(destLng - startLng);

            const y = Math.sin(deltaLambda) * Math.cos(phi2);
            const x = Math.cos(phi1) * Math.sin(phi2) - Math.sin(phi1) * Math.cos(phi2) * Math.cos(deltaLambda);
            let bearing = toDegrees(Math.atan2(y, x));
            
            return (bearing + 360) % 360; // Normalize to 0-360
        }

        // 5. Run the Compass
        function startCompass() {
            if ('ondeviceorientationabsolute' in window) {
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
            } else if ('ondeviceorientation' in window) {
                window.addEventListener('deviceorientation', handleOrientation, true);
            } else {
                statusText.innerText = "Device orientation not supported.";
            }
        }

        function handleOrientation(event) {
            let userHeading = 0;
            // iOS uses webkitCompassHeading, Android uses absolute alpha
            if (event.webkitCompassHeading) {
                userHeading = event.webkitCompassHeading;
            } else if (event.alpha !== null) {
                userHeading = 360 - event.alpha;
            }

            // Smoothing logic (Exponential Moving Average)
            if (smoothedUserHeading === null) {
                smoothedUserHeading = userHeading;
            } else {
                let diff = userHeading - smoothedUserHeading;
                // Handle the 360 -> 0 degree wrap-around
                if (diff > 180) diff -= 360;
                if (diff < -180) diff += 360;
                smoothedUserHeading += diff * SMOOTHING_FACTOR;
            }

            let pointerAngle = targetBearing - smoothedUserHeading;
            arrow.style.transform = `rotate(${pointerAngle}deg)`;
        }
    </script>
</body>
</html>
